<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Después del Colegio · Asistente</title>
<meta name="description" content="Resuelve tus dudas sobre institutos, universidades, carreras y becas en Perú." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=IBM+Plex+Mono:wght@500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #F3F6F1;
    --card: #FFFFFF;
    --ink: #1C2B26;
    --ink-soft: #55645D;
    --teal: #1C3A34;
    --teal-soft: #2C4C44;
    --gold: #D9A441;
    --gold-deep: #B8842C;
    --border: #DEE6DA;
    --radius: 16px;
    --font-display: 'Fraunces', serif;
    --font-body: 'IBM Plex Sans', sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:var(--font-body);
    display:flex;
    justify-content:center;
  }
  .app{
    width:100%;
    max-width:720px;
    min-height:100dvh;
    display:flex;
    flex-direction:column;
    background:var(--card);
    box-shadow:0 0 40px rgba(28,58,52,0.06);
  }

  /* Header */
  header{
    padding:22px 20px 18px;
    border-bottom:1px solid var(--border);
    background:
      radial-gradient(circle at 88% -20%, rgba(217,164,65,0.15), transparent 55%),
      var(--card);
    position:relative;
  }
  .eyebrow{
    font-family:var(--font-mono);
    font-size:11px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--gold-deep);
    display:flex;
    align-items:center;
    gap:8px;
    margin-bottom:8px;
  }
  .eyebrow .dot{width:6px;height:6px;border-radius:50%;background:var(--gold);}
  h1{
    font-family:var(--font-display);
    font-weight:600;
    font-size:26px;
    margin:0 0 4px;
    color:var(--teal);
    letter-spacing:-0.01em;
  }
  header p{
    margin:0;
    font-size:14px;
    color:var(--ink-soft);
    max-width:46ch;
    line-height:1.5;
  }
  .path-svg{position:absolute; right:18px; top:20px; opacity:0.9;}

  /* Chat area */
  main{
    flex:1;
    overflow-y:auto;
    padding:18px 16px 10px;
    display:flex;
    flex-direction:column;
    gap:14px;
  }

  .chips{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    padding:2px 2px 6px;
  }
  .chip{
    font-family:var(--font-body);
    font-size:13px;
    color:var(--teal);
    background:#EFF5EE;
    border:1px solid var(--border);
    border-radius:999px;
    padding:9px 14px;
    cursor:pointer;
    transition:transform .12s ease, background .12s ease;
    text-align:left;
  }
  .chip:hover{background:var(--gold-soft, #F5E7C8); transform:translateY(-1px);}

  .msg{
    display:flex;
    gap:10px;
    max-width:88%;
    animation:rise .25s ease;
  }
  @keyframes rise{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }

  .msg.bot{align-self:flex-start;}
  .msg.user{align-self:flex-end; flex-direction:row-reverse;}

  .avatar{
    flex:none;
    width:30px;height:30px;
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    background:var(--teal);
    color:#fff;
  }
  .msg.user .avatar{background:var(--gold); color:var(--teal);}

  .bubble{
    padding:12px 14px;
    border-radius:var(--radius);
    font-size:14.5px;
    line-height:1.55;
    white-space:pre-wrap;
  }
  .msg.bot .bubble{
    background:#F0F4EE;
    color:var(--ink);
    border-bottom-left-radius:4px;
  }
  .msg.user .bubble{
    background:var(--teal);
    color:#F6F3E9;
    border-bottom-right-radius:4px;
  }

  .sources{
    margin-top:10px;
    padding-top:9px;
    border-top:1px solid #DDE6D9;
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    align-items:center;
  }
  .sources-label{
    font-family:var(--font-mono);
    font-size:10px;
    letter-spacing:0.06em;
    text-transform:uppercase;
    color:var(--ink-soft);
    margin-right:2px;
  }
  .sources a{
    font-size:12px;
    color:var(--gold-deep);
    background:#FBF3E2;
    border:1px solid #EBD9AE;
    border-radius:999px;
    padding:4px 10px;
    text-decoration:none;
    max-width:180px;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  .sources a:hover{ text-decoration:underline; }

  .typing{display:flex; gap:4px; padding:4px 2px;}
  .typing span{
    width:6px;height:6px;border-radius:50%;
    background:var(--ink-soft);
    animation:blink 1.2s infinite ease-in-out;
  }
  .typing span:nth-child(2){animation-delay:.2s;}
  .typing span:nth-child(3){animation-delay:.4s;}
  @keyframes blink{ 0%,80%,100%{opacity:.25;} 40%{opacity:1;} }

  .error-note{
    align-self:flex-start;
    font-size:13px;
    color:#8A3B2B;
    background:#FBEAE4;
    border:1px solid #F1CFC3;
    padding:8px 12px;
    border-radius:10px;
  }

  /* Input bar */
  form{
    display:flex;
    gap:8px;
    padding:12px 16px calc(14px + env(safe-area-inset-bottom));
    border-top:1px solid var(--border);
    background:var(--card);
  }
  textarea{
    flex:1;
    resize:none;
    border:1px solid var(--border);
    border-radius:12px;
    padding:11px 14px;
    font-family:var(--font-body);
    font-size:14.5px;
    line-height:1.4;
    max-height:120px;
    background:#FBFCFA;
    color:var(--ink);
  }
  textarea:focus{outline:2px solid var(--gold); outline-offset:1px;}
  button[type=submit]{
    flex:none;
    width:44px;height:44px;
    border-radius:12px;
    border:none;
    background:var(--teal);
    color:#fff;
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:background .15s ease;
  }
  button[type=submit]:hover{background:var(--teal-soft);}
  button[type=submit]:disabled{opacity:0.5; cursor:default;}

  footer{
    text-align:center;
    font-family:var(--font-mono);
    font-size:10.5px;
    letter-spacing:0.03em;
    color:var(--ink-soft);
    padding:0 16px 12px;
  }

  @media (prefers-reduced-motion: reduce){
    .msg{animation:none;}
    .typing span{animation:none;}
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <svg class="path-svg" width="64" height="40" viewBox="0 0 64 40" fill="none" aria-hidden="true">
      <path d="M4 34 C 16 34, 16 10, 28 10 S 48 30, 60 6" stroke="#D9A441" stroke-width="2" stroke-linecap="round" stroke-dasharray="1 7"/>
      <circle cx="4" cy="34" r="3" fill="#1C3A34"/>
      <circle cx="60" cy="6" r="3" fill="#D9A441"/>
    </svg>
    <div class="eyebrow"><span class="dot"></span>Guía después del colegio</div>
    <h1>¿Qué estudio, dónde y con qué beca?</h1>
    <p>Pregúntame sobre institutos, universidades, carreras y becas en Perú. Te respondo directo, sin vueltas.</p>
  </header>

  <main id="main">
    <div class="chips" id="chips">
      <button class="chip" type="button">¿Instituto o universidad, qué me conviene?</button>
      <button class="chip" type="button">¿Cómo postulo a Beca 18?</button>
      <button class="chip" type="button">Carreras con más demanda laboral</button>
      <button class="chip" type="button">¿Qué es el crédito educativo?</button>
    </div>
  </main>

  <form id="form">
    <textarea id="input" rows="1" placeholder="Escribe tu pregunta..." maxlength="2000"></textarea>
    <button type="submit" aria-label="Enviar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M3 11L21 3L13 21L11 13L3 11Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/></svg>
    </button>
  </form>
  <footer>NO REEMPLAZA A UN ASESOR VOCACIONAL · VERIFICA FECHAS Y MONTOS EN LA FUENTE OFICIAL</footer>
</div>

<script>
  const main = document.getElementById('main');
  const chips = document.getElementById('chips');
  const form = document.getElementById('form');
  const input = document.getElementById('input');
  const sendBtn = form.querySelector('button');

  let previousInteractionId = null;
  let busy = false;

  function autoGrow(){
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  }
  input.addEventListener('input', autoGrow);

  function addMessage(role, text, sources){
    const wrap = document.createElement('div');
    wrap.className = 'msg ' + role;
    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.innerHTML = role === 'bot'
      ? '<svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M12 2l2.4 7.2H22l-6 4.4 2.4 7.2L12 16.4 5.6 20.8 8 13.6 2 9.2h7.6L12 2z" fill="currentColor"/></svg>'
      : '<svg width="14" height="14" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="4" fill="currentColor"/><path d="M4 20c0-4.4 3.6-7 8-7s8 2.6 8 7" stroke="currentColor" stroke-width="2"/></svg>';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;

    if (sources && sources.length){
      const srcWrap = document.createElement('div');
      srcWrap.className = 'sources';
      const label = document.createElement('div');
      label.className = 'sources-label';
      label.textContent = 'Fuentes';
      srcWrap.appendChild(label);
      sources.slice(0, 4).forEach((s) => {
        const a = document.createElement('a');
        a.href = s.uri;
        a.target = '_blank';
        a.rel = 'noopener noreferrer';
        a.textContent = s.title;
        srcWrap.appendChild(a);
      });
      bubble.appendChild(srcWrap);
    }

    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    main.appendChild(wrap);
    main.scrollTop = main.scrollHeight;
    return bubble;
  }

  function addTyping(){
    const wrap = document.createElement('div');
    wrap.className = 'msg bot';
    wrap.id = 'typing-indicator';
    wrap.innerHTML = '<div class="avatar"><svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M12 2l2.4 7.2H22l-6 4.4 2.4 7.2L12 16.4 5.6 20.8 8 13.6 2 9.2h7.6L12 2z" fill="currentColor"/></svg></div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
    main.appendChild(wrap);
    main.scrollTop = main.scrollHeight;
  }

  function removeTyping(){
    const t = document.getElementById('typing-indicator');
    if (t) t.remove();
  }

  async function sendMessage(text){
    if (busy || !text.trim()) return;
    busy = true;
    sendBtn.disabled = true;
    if (chips) chips.remove();

    addMessage('user', text);
    addTyping();

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, previousInteractionId }),
      });
      const data = await res.json();
      removeTyping();

      if (!res.ok) {
        addMessage('bot', data.error || 'Algo salió mal. Intenta de nuevo.');
      } else {
        previousInteractionId = data.interactionId || previousInteractionId;
        addMessage('bot', data.text, data.sources);
      }
    } catch (err) {
      removeTyping();
      addMessage('bot', 'No pude conectarme. Revisa tu internet e intenta de nuevo.');
    } finally {
      busy = false;
      sendBtn.disabled = false;
      input.focus();
    }
  }

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    const text = input.value;
    input.value = '';
    autoGrow();
    sendMessage(text);
  });

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      form.requestSubmit();
    }
  });

  chips.querySelectorAll('.chip').forEach((btn) => {
    btn.addEventListener('click', () => sendMessage(btn.textContent));
  });
</script>
</body>
</html>
